{% extends 'admin/base.html' %}
{% block content %}
<h2>Makale Düzenle</h2>
<form method="POST" enctype="multipart/form-data">
  <div class="form-group">
    <label>Başlık</label>
    <input type="text" name="title" class="form-control" value="{{ project.title }}">
  </div>

  <div class="form-group">
    <label>Hukuk Alanı</label>
    <input type="text" name="category" class="form-control" value="{{ project.category }}">
  </div>

  <div class="form-group">
    <label>İçerik</label>
    <textarea name="content" class="form-control" rows="8">{{ project.content }}</textarea>
  </div>

  <div class="form-group">
    <label>Görsel</label><br>
    {% if project.image %}
      <img src="{{ url_for('static', filename='uploads/' + project.image) }}" height="100"><br><br>
    {% endif %}
    <input type="file" name="image" class="form-control-file">
    <small>Desteklenen formatlar: JPG, PNG</small>
  </div>

  <button type="submit" class="btn btn-primary">Kaydet</button>
</form>
{% endblock %}
