{% extends 'base.html' %}

{% block content %}
<!-- Hero Section - Redesigned for simplicity -->
<section class="hero-full" style="background-image: url('{{ url_for('static', filename='uploads/' + settings.homepage_image) if settings.homepage_image else 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80' }}');">
    <div class="hero-overlay"></div>
    <div class="hero-center">
        <div class="logo-large">
            <img src="{{ url_for('static', filename='assets/new-logo.svg') }}" alt="Kılınç Hukuk Logo">

        <div class="hero-subtitle-large">AV. NAİL FURKAN KILINÇ</div>
        
        <div class="home-menu">

            <a href="{{ url_for('iletisim') }}" class="home-menu-item">İLETİŞİM</a>

        <div class="copyright-home">

    </div>
